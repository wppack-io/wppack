name: Close Pull Request

on:
  pull_request_target:
    types: [opened]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - uses: superbrothers/close-pull-request@v3
      with:
        comment: |
          ## Thank you for contributing!

          This repository is a read-only subtree split automatically synced from the monorepo, so this pull request has been automatically closed.

          Please submit your PR to the main repository instead:
          https://github.com/wppack-io/wppack

          We look forward to your contribution!
