name: CI

on:
  push:
    branches: [1.x]
  pull_request:
    branches: [1.x]
  # Manual trigger runs the complete PHP × DB × WP matrix (56 jobs) for
  # thorough back/forward-compat verification. Automatic push/PR stays
  # at 19 jobs (current WP full + 1 smoke per other WP).
  workflow_dispatch:

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: redis, relay, memcached, apcu, pgsql, pdo_sqlite
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --ansi

  cs-check:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --ansi

  # Emit the test matrix based on the trigger event:
  #   push / PR          → 19 jobs (WP 6.9 full PHP × DB + smoke combo per other WP)
  #   workflow_dispatch  → 56 jobs (every PHP × DB × WP minus PHP 8.5 × WP 6.7/6.8)
  # Job-level `if:` with matrix context is not supported by GitHub Actions,
  # so matrix shaping has to happen before the matrix is expanded.
  matrix:
    name: Compute test matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.build.outputs.include }}
    steps:
      - id: build
        env:
          EVENT: ${{ github.event_name }}
        run: |
          full=$(for php in 8.2 8.3 8.4 8.5; do
            for db in wpdb sqlite mysql postgresql; do
              for wp in 6.7 6.8 6.9 7.0; do
                # WP 6.7 / 6.8 were not tested against PHP 8.5 by WP core.
                if [[ "$php" == "8.5" && ( "$wp" == "6.7" || "$wp" == "6.8" ) ]]; then
                  continue
                fi
                jq -nc --arg p "$php" --arg d "$db" --arg w "$wp" \
                  '{"php":$p,"db-engine":$d,"wp":$w}'
              done
            done
          done | jq -sc .)
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            include="$full"
          else
            include=$(echo "$full" | jq -c \
              '[.[] | select(.wp == "6.9" or (.php == "8.2" and ."db-engine" == "wpdb"))]')
          fi
          echo "include=$include" >> "$GITHUB_OUTPUT"

  tests:
    needs: matrix
    name: Tests (PHP ${{ matrix.php }}, WP ${{ matrix.wp }}, DB ${{ matrix.db-engine }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.db-engine != 'wpdb' }}
    permissions:
      id-token: write
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: wppack_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: --health-cmd="valkey-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
        options: --health-cmd="echo stats | nc localhost 11211" --health-interval=10s --health-timeout=5s --health-retries=3
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: wppack
          POSTGRES_PASSWORD: wppack
          POSTGRES_DB: wppack_test
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis, relay, memcached, apcu, pgsql, pdo_sqlite
          ini-values: apc.enable_cli=1
          tools: composer:v2
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # Pin roots/wordpress-full to the matrix WP major.minor. The -full
      # variant includes beta/RC tags so pre-release rows (e.g. 7.0) can
      # resolve; the @beta stability flag authorises those tags without
      # loosening project-wide stability.
      # wp-phpunit/wp-phpunit is pinned to match for stable WP rows, but
      # kept at the composer.json default for pre-release rows where no
      # matching tag exists yet (the latest stable is forward-compatible
      # enough to bootstrap the WP 7.0 test suite).
      - name: Pin WordPress ${{ matrix.wp }}
        run: |
          if [[ "${{ matrix.wp }}" == "7.0" ]]; then
            composer require --no-interaction --no-progress --prefer-dist \
              "roots/wordpress-full:^${{ matrix.wp }}@beta"
          else
            composer require --no-interaction --no-progress --prefer-dist \
              "roots/wordpress-full:^${{ matrix.wp }}" \
              "wp-phpunit/wp-phpunit:^${{ matrix.wp }}"
          fi

      - name: Start Valkey Cluster
        run: |
          for port in 7010 7011 7012; do
            docker run -d --name valkey-$port --network host valkey/valkey:8 \
              valkey-server --port $port --cluster-enabled yes \
              --cluster-config-file nodes-$port.conf --cluster-node-timeout 5000
          done
          sleep 2
          docker run --rm --network host valkey/valkey:8 \
            valkey-cli --cluster create 127.0.0.1:7010 127.0.0.1:7011 127.0.0.1:7012 \
            --cluster-replicas 0 --cluster-yes

      - name: Start Valkey Sentinel
        run: |
          docker run -d --name valkey-master --network host valkey/valkey:8 \
            valkey-server --port 6380
          docker run -d --name valkey-replica --network host valkey/valkey:8 \
            valkey-server --port 6381 --replicaof 127.0.0.1 6380
          sleep 2
          for port in 26379 26380 26381; do
            dir="/tmp/sentinel-$port"
            mkdir -p "$dir"
            chmod 777 "$dir"
            printf "port $port\ndir $dir\nsentinel monitor mymaster 127.0.0.1 6380 2\nsentinel down-after-milliseconds mymaster 5000\nsentinel failover-timeout mymaster 10000\n" > "$dir/sentinel.conf"
            chmod 666 "$dir/sentinel.conf"
            docker run -d --name valkey-sentinel-$port --network host \
              -v "$dir:$dir" \
              valkey/valkey:8 valkey-server "$dir/sentinel.conf" --sentinel
          done
          echo "Waiting for Sentinel to discover master..."
          for i in $(seq 1 30); do
            result=$(docker exec valkey-sentinel-26379 valkey-cli -p 26379 SENTINEL get-master-addr-by-name mymaster 2>&1) || true
            if echo "$result" | grep -q '6380'; then
              echo "Sentinel is ready (attempt $i)."
              break
            fi
            sleep 1
          done

      # Resolve DATABASE_DSN from the matrix db-engine dimension. The db.php
      # drop-in is active in tests/ (via WP_CONTENT_DIR symlink) and routes
      # WPPackWpdb to the driver selected by DATABASE_DSN. The 'wpdb' variant
      # short-circuits the drop-in so standard $wpdb (mysqli) is used.
      - name: Resolve DATABASE_DSN
        id: dsn
        run: |
          case '${{ matrix.db-engine }}' in
            wpdb)       dsn='wpdb://' ;;
            sqlite)     dsn='sqlite:///tmp/wppack-test.db' ;;
            mysql)      dsn='mysql://root:password@127.0.0.1:3306/wppack_test?charset=utf8mb4&collate=utf8mb4_general_ci' ;;
            postgresql) dsn='pgsql://wppack:wppack@127.0.0.1:5432/wppack_test' ;;
          esac
          echo "value=$dsn" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: vendor/bin/phpunit --colors=always --coverage-clover coverage.xml --log-junit junit.xml
        env:
          DATABASE_DSN: ${{ steps.dsn.outputs.value }}
          WPPACK_TEST_DB_PORT: '3306'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: php${{ matrix.php }}-wp${{ matrix.wp }}-${{ matrix.db-engine }}
          use_oidc: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: junit.xml
          flags: php${{ matrix.php }}-wp${{ matrix.wp }}-${{ matrix.db-engine }}
          report_type: test_results
          use_oidc: true
