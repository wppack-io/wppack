name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: redis, relay, memcached, apcu
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

  cs-check:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wppack_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: --health-cmd="valkey-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
        options: --health-cmd="echo stats | nc localhost 11211" --health-interval=10s --health-timeout=5s --health-retries=3
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: redis, relay, memcached, apcu
          ini-values: apc.enable_cli=1
          tools: composer:v2
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup WordPress test config
        run: cp tests/wp-config.php.dist tests/wp-config.php

      - name: Run tests
        run: vendor/bin/phpunit --coverage-clover coverage.xml --log-junit junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: php${{ matrix.php }}
          use_oidc: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: junit.xml
          flags: php${{ matrix.php }}
          report_type: test_results
          use_oidc: true
