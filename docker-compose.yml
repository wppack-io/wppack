services:
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wppack_dev
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
  mysql-test:
    image: mysql:8.0
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wppack_test
    ports:
      - '3307:3306'
    tmpfs:
      - /var/lib/mysql
  valkey:
    image: valkey/valkey:8
    ports:
      - '6379:6379'
    tmpfs:
      - /data
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - '8000:8000'
    tmpfs:
      - /home/dynamodblocal/data
  valkey-cluster:
    image: valkey/valkey:8
    ports:
      - '7010:7010'
      - '7011:7011'
      - '7012:7012'
    entrypoint: >
      sh -c "
        valkey-server --port 7010 --cluster-enabled yes --cluster-config-file nodes-7010.conf --cluster-node-timeout 5000 --daemonize yes &&
        valkey-server --port 7011 --cluster-enabled yes --cluster-config-file nodes-7011.conf --cluster-node-timeout 5000 --daemonize yes &&
        valkey-server --port 7012 --cluster-enabled yes --cluster-config-file nodes-7012.conf --cluster-node-timeout 5000 --daemonize yes &&
        sleep 1 &&
        valkey-cli --cluster create 127.0.0.1:7010 127.0.0.1:7011 127.0.0.1:7012 --cluster-replicas 0 --cluster-yes &&
        tail -f /dev/null
      "
    tmpfs:
      - /data
  valkey-sentinel:
    image: valkey/valkey:8
    ports:
      - '6380:6380'
      - '6381:6381'
      - '26379:26379'
      - '26380:26380'
      - '26381:26381'
    entrypoint: >
      sh -c "
        valkey-server --port 6380 --daemonize yes &&
        valkey-server --port 6381 --replicaof 127.0.0.1 6380 --daemonize yes &&
        sleep 1 &&
        for p in 26379 26380 26381; do
          echo port $$p > /tmp/s-$$p.conf;
          echo sentinel monitor mymaster 127.0.0.1 6380 2 >> /tmp/s-$$p.conf;
          echo sentinel down-after-milliseconds mymaster 5000 >> /tmp/s-$$p.conf;
          echo sentinel failover-timeout mymaster 10000 >> /tmp/s-$$p.conf;
        done &&
        valkey-server /tmp/s-26379.conf --sentinel --daemonize yes &&
        valkey-server /tmp/s-26380.conf --sentinel --daemonize yes &&
        valkey-server /tmp/s-26381.conf --sentinel --daemonize yes &&
        tail -f /dev/null
      "
    tmpfs:
      - /data
  memcached:
    image: memcached:1.6
    ports:
      - '11211:11211'
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm --features=scripts
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - '8081:8080'
    volumes:
      - ./docker/keycloak/master-realm.json:/opt/keycloak/data/import/master-realm.json:ro

volumes:
  mysql-data:
